name: Rust CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pinned Rust version for reproducible CI. Bump intentionally after local testing.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      # macos-latest ships a Homebrew rustup whose `cargo` shim fails with
      # "unexpected argument 'fmt'" and lives in PATH ahead of ~/.cargo/bin
      # in fresh shells. Prepend ~/.cargo/bin to $GITHUB_PATH so every
      # subsequent step uses the dtolnay-installed cargo. Use rustup +toolchain
      # syntax as belt-and-braces — it always resolves through the canonical
      # rustup proxy regardless of PATH order.
      - name: Pin default toolchain
        shell: bash
        run: |
          rustup default 1.95.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustc" --version
          "$HOME/.cargo/bin/cargo" --version

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}-cargo-cache
          workspaces: ./rust -> target

      - name: Check formatting
        working-directory: rust
        run: cargo +1.95.0 fmt --all -- --check

      - name: Clippy lints
        working-directory: rust
        run: cargo +1.95.0 clippy --workspace --all-features -- -D warnings

      - name: Build
        working-directory: rust
        run: cargo +1.95.0 build --workspace --verbose

      - name: Run tests (excluding upstream-dependent tests)
        working-directory: rust
        run: cargo +1.95.0 test --workspace --exclude compat-harness --verbose

  lsp-feature:
    name: LSP feature build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy

      - name: Pin default toolchain
        run: |
          rustup default 1.95.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest-cargo-cache
          workspaces: ./rust -> target

      # CP 3.3: the LSP client is gated behind `--features lsp`; build, lint, and
      # test it explicitly so the feature-gated code stays green even though the
      # default workspace build excludes it.
      - name: Build, clippy and test lsp crate with --features lsp
        working-directory: rust
        run: |
          cargo +1.95.0 build -p lsp --features lsp --verbose
          cargo +1.95.0 clippy -p lsp --features lsp -- -D warnings
          cargo +1.95.0 test -p lsp --features lsp --verbose

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pinned Rust version for reproducible CI. Bump intentionally after local testing.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Pin default toolchain
        run: |
          rustup default 1.95.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        working-directory: rust
        run: cargo +1.95.0 llvm-cov --workspace --exclude compat-harness --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: rust/lcov.info
          fail_ci_if_error: false
