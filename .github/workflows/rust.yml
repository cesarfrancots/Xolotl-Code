name: Rust CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}-cargo-cache
          workspaces: ./rust -> target

      - name: Check formatting
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Clippy lints
        working-directory: rust
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Build
        working-directory: rust
        run: cargo build --workspace --verbose

      - name: Run tests (excluding upstream-dependent tests)
        working-directory: rust
        run: cargo test --workspace --exclude compat-harness --verbose

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        working-directory: rust
        run: cargo llvm-cov --workspace --exclude compat-harness --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: rust/lcov.info
          fail_ci_if_error: false
